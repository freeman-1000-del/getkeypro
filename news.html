<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MoneyKey Report</title>
  <meta name="description" content="MoneyKey Report — 모바일 주식·경제 융합 리포트" />
  <meta name="robots" content="index,follow" />
  <!--
    =============================================================================
    MoneyKey Report 독립 뉴스룸 (/news) — getkeypro 유료 메인과 분리
    [CONFIG] 기획자 입력 — 큰따옴표 안에 값만 붙여넣으세요
    =============================================================================
  -->
  <script>
    window.MONEYKEY_CONFIG = {
      SUPABASE_URL: "https://ajvtyotblrtexcxuazqm.supabase.co",
      SUPABASE_ANON_KEY: "sb_publishable_cmn9eVnnvaAjXVJWa6bRQA_qrb1xglQ",
      TABLE: "posts",
      ADSENSE_CLIENT: "ca-pub-XXXXXXXXXXXXXXXX",
      ADSENSE_SLOT: "XXXXXXXXXX"
    };
  </script>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");

    :root {
      --bg: #0d1117;
      --bg-soft: #11161d;
      --card: #161b22;
      --card-lift: #1c2330;
      --txt: #e6edf3;
      --sub: #8b949e;
      --line: rgba(255, 255, 255, 0.06);
      --accent: #3dd68c;
      --accent-dim: rgba(61, 214, 140, 0.14);
      --nav: #1a1f27;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.04);
      --pad: 20px;
      --radius: 18px;
      --max: 720px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(1200px 500px at 50% -10%, rgba(61, 214, 140, 0.07), transparent 55%),
        var(--bg);
      color: var(--txt);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
      line-height: 2;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* —— 대문 내비게이션 —— */
    header.brand {
      position: sticky;
      top: 0;
      z-index: 50;
      background: linear-gradient(180deg, #222833 0%, var(--nav) 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
      margin: 0 0 28px;
      padding: 0;
    }
    header.brand .nav-inner {
      width: min(var(--max), 100%);
      margin: 0 auto;
      padding: 20px var(--pad) 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
    }
    header.brand .logo {
      display: block;
      width: 100%;
      text-decoration: none;
      color: inherit;
      line-height: 0;
    }
    header.brand .logo img {
      width: 100%;
      height: auto;
      max-height: none;
      display: block;
      object-fit: contain;
      background: #fff;
      border-radius: 16px;
      padding: 12px 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.28);
    }
    header.brand h1.sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    header.brand p {
      margin: 0;
      color: var(--sub);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.35;
      text-align: center;
      max-width: none;
    }

    .wrap {
      width: min(var(--max), 100%);
      margin: 0 auto;
      padding: 0 var(--pad) 96px;
    }

    /* —— 블로그 포스팅 카드 —— */
    .card {
      background: linear-gradient(165deg, var(--card-lift) 0%, var(--card) 48%, #131820 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0;
      margin: 0 0 28px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      box-shadow:
        0 16px 48px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(61, 214, 140, 0.12),
        0 0 24px rgba(61, 214, 140, 0.05);
    }
    .card .meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--sub);
      margin: 0;
      padding: 18px var(--pad) 0;
    }
    .tag {
      padding: 6px 14px;
      border-radius: 999px;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.3;
    }
    .card h2 {
      margin: 0;
      padding: 12px var(--pad) 16px;
      font-size: clamp(20px, 4.2vw, 24px);
      line-height: 1.45;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #d4af37;
    }

    /* 썸네일: 카드 좌우에 딱 맞춤 */
    .thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      margin: 0 0 22px;
      border-radius: 0;
      background: #0f141b;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    /* 본문 칼럼 */
    .body,
    .body-half {
      font-size: 18px;
      line-height: 2;
      color: #d8dee6;
      word-break: keep-all;
      overflow-wrap: break-word;
      padding: 0 var(--pad) 28px;
      margin: 0;
      letter-spacing: -0.01em;
    }
    .body .seg {
      margin: 0 0 1em;
      line-height: 2;
    }
    .body .seg:last-child {
      margin-bottom: 0;
    }
    /* 기사 시작 후킹(골드). 사족 큐는 표시하지 않음 */
    .body .seg-hook {
      margin: 2.4em 0 1.2em;
      padding: 0.15em 0;
      color: #d4af37;
      font-weight: 700;
      font-size: 1.08em;
      line-height: 1.5;
      text-align: center;
      letter-spacing: -0.02em;
    }
    .body .seg-hook:first-child {
      margin-top: 0.6em;
    }
    .body .seg-bridge,
    .body .seg-topic {
      margin: 2.4em 0 1.2em;
      padding: 0.15em 0;
      color: #d4af37;
      font-weight: 700;
      font-size: 1.08em;
      line-height: 1.5;
      text-align: center;
      letter-spacing: -0.02em;
    }

    .ad-slot {
      margin: 16px var(--pad);
      padding: 14px;
      border: 1px dashed rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.22);
      min-height: 90px;
      text-align: center;
    }
    .ad-slot .ad-label {
      font-size: 11px;
      color: #6b7582;
      margin-bottom: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .state {
      text-align: center;
      color: var(--sub);
      padding: 64px 16px;
      font-size: 15px;
      line-height: 1.7;
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    footer.note {
      margin-top: 8px;
      padding: 24px 8px 8px;
      font-size: 12px;
      color: var(--sub);
      text-align: center;
      line-height: 1.7;
      border-top: 1px solid var(--line);
    }

    @media (min-width: 768px) {
      header.brand .nav-inner {
        padding: 24px 28px 22px;
      }
      header.brand .logo img {
        padding: 14px 20px;
        border-radius: 18px;
      }
      header.brand p {
        font-size: 21px;
      }
      .wrap { padding: 8px 28px 120px; }
      .card { margin-bottom: 36px; }
      .card .meta,
      .card h2,
      .body,
      .body-half { padding-left: 28px; padding-right: 28px; }
      .ad-slot { margin-left: 28px; margin-right: 28px; }
      .thumb { margin-bottom: 28px; }
    }
  </style>
</head>
<body>
  <header class="brand">
    <div class="nav-inner">
      <a class="logo" href="./news.html">
        <img src="./moneykey-logo.png" alt="머니키 리포트" width="1024" height="277" />
      </a>
      <p>내 손 안에 펼쳐지는 경제</p>
    </div>
    <h1 class="sr-only">머니키 리포트</h1>
  </header>
  <div class="wrap">
    <div id="feed" class="state">불러오는 중…</div>
    <footer class="note">본 페이지는 정보 제공 목적이며 투자 권유가 아닙니다.</footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      var cfg = window.MONEYKEY_CONFIG || {};
      var feed = document.getElementById("feed");

      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function adBox(label) {
        // AdSense 승인 전: 플레이스홀더 노출 없음
        return "";
      }

      function isFillerCue(text) {
        var t = String(text || "").trim();
        return (
          t === "첫 번째 소식 보시죠." ||
          t === "첫 번째 소식입니다." ||
          t === "다음 소식 보시죠." ||
          t === "그 다음 소식 보실까요?" ||
          t === "두 번째 소식 보시죠." ||
          /^다음은\s*['‘'].+['’']\s*이야기입니다\.?$/.test(t)
        );
      }

      function decorateBody(raw) {
        var html = String(raw || "");
        if (html.indexOf("<br") < 0) {
          html = esc(html).replace(/\n/g, "<br>");
        }
        var parts = html.split(/<br\s*\/?>/i);
        var out = [];
        var afterFiller = false;
        for (var i = 0; i < parts.length; i++) {
          var line = String(parts[i] || "")
            .replace(/&nbsp;/gi, " ")
            .trim();
          if (!line) continue;
          // 발행 마커 «H»후킹
          if (line.indexOf("«H»") === 0 || line.indexOf("&laquo;H&raquo;") === 0) {
            var hook = line.replace(/^«H»/, "").replace(/^&laquo;H&raquo;/, "");
            out.push('<p class="seg-hook">' + hook + "</p>");
            afterFiller = false;
            continue;
          }
          if (isFillerCue(line)) {
            afterFiller = true; // 사족 삭제, 다음 줄을 후킹으로
            continue;
          }
          if (afterFiller) {
            out.push('<p class="seg-hook">' + line + "</p>");
            afterFiller = false;
            continue;
          }
          out.push('<p class="seg">' + line + "</p>");
        }
        return '<div class="body">' + out.join("") + "</div>";
      }

      function bodyWithMidAd(raw) {
        // AdSense 슬롯은 현재 비활성 — 본문만 서식 적용
        return decorateBody(raw);
      }

      function fmtDate(iso) {
        try {
          var d = new Date(iso);
          if (isNaN(d.getTime())) return "";
          return d.toLocaleString("ko-KR", {
            year: "numeric", month: "2-digit", day: "2-digit",
            hour: "2-digit", minute: "2-digit"
          });
        } catch (e) { return ""; }
      }

      function cardHtml(row) {
        var title = row.title || "";
        var img = row.image_url || "";
        return (
          '<article class="card">' +
          '<div class="meta"><span class="tag">' +
          esc(row.category || "주식") +
          "</span><span>" + esc(fmtDate(row.created_at)) + "</span></div>" +
          (img
            ? '<img class="thumb" src="' + esc(img) + '" alt="' + esc(title) + '" loading="lazy" />'
            : "") +
          adBox("썸네일 바로 아래") +
          "<h2>" + esc(title) + "</h2>" +
          bodyWithMidAd(row.body || "") +
          "</article>"
        );
      }

      async function load() {
        if (!cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY) {
          feed.innerHTML = '<div class="state">CONFIG 키를 입력하세요.</div>';
          return;
        }
        try {
          var client = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
          var res = await client
            .from(cfg.TABLE || "posts")
            .select("id,title,body,image_url,category,created_at")
            .order("created_at", { ascending: false })
            .limit(40);
          if (res.error) throw res.error;
          var rows = (res.data || []).filter(function (row) {
            var t = String(row.title || "");
            var id = String(row.id || "");
            if (t.indexOf("__probe__") >= 0) return false;
            // 구버전 숨김
            if (id === "a7e0cdd0-f1e1-4c60-9485-0d53d0fcf4e7") return false;
            if (id === "c7d0659a-e86a-4bdb-a168-9d5d66c0e3ef") return false;
            if (id === "b516cdf3-1aa8-4454-900e-a027a2bdc500") return false;
            if (id === "23f7e12b-88eb-4ba3-8289-c6288b440843") return false;
            if (id === "33d993bc-df9b-433d-9d72-9cc8b96a3722") return false;
            if (id === "1a9113fa-f7a2-40d0-976c-5573573b8f81") return false;
            if (id === "e267fc1d-0b91-4e21-8bd2-ab5ae9e6cc16") return false;
            if (id === "c755635a-4daa-420b-8190-5f293aad9db9") return false;
            if (id === "cd37833d-77e9-4bd7-8052-bdfd550f3248") return false;
            if (id === "27d112a3-f431-4129-b5de-383181963da2") return false;
            return true;
          });
          if (!rows.length) {
            feed.innerHTML = '<div class="state">아직 발행된 리포트가 없습니다.</div>';
            return;
          }
          feed.innerHTML = rows.map(cardHtml).join("");
        } catch (err) {
          feed.innerHTML =
            '<div class="state">불러오기 실패: ' +
            esc((err && err.message) || String(err)) +
            "</div>";
        }
      }

      load();
    })();
  </script>
</body>
</html>
