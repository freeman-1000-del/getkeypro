<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MoneyKey Report</title>
  <meta name="description" content="MoneyKey Report — 모바일 주식·경제 융합 리포트" />
  <meta name="robots" content="index,follow" />
  <!--
    =============================================================================
    MoneyKey Report 독립 뉴스룸 (/news) — getkeypro 유료 메인과 분리
    [CONFIG] 기획자 입력 — 큰따옴표 안에 값만 붙여넣으세요
    =============================================================================
  -->
  <script>
    window.MONEYKEY_CONFIG = {
      SUPABASE_URL: "https://ajvtyotblrtexcxuazqm.supabase.co",
      SUPABASE_ANON_KEY: "sb_publishable_cmn9eVnnvaAjXVJWa6bRQA_qrb1xglQ",
      TABLE: "posts",
      ADSENSE_CLIENT: "ca-pub-XXXXXXXXXXXXXXXX",
      ADSENSE_SLOT: "XXXXXXXXXX"
    };
  </script>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");

    :root {
      --bg: #0d1117;
      --bg-soft: #11161d;
      --card: #161b22;
      --card-lift: #1c2330;
      --txt: #e6edf3;
      --sub: #8b949e;
      --line: rgba(255, 255, 255, 0.06);
      --accent: #3dd68c;
      --accent-dim: rgba(61, 214, 140, 0.14);
      --nav: #1a1f27;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.04);
      --pad: 20px;
      --radius: 18px;
      --max: 720px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(1200px 500px at 50% -10%, rgba(61, 214, 140, 0.07), transparent 55%),
        var(--bg);
      color: var(--txt);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
      line-height: 2;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* —— 대문 내비게이션 —— */
    header.brand {
      position: sticky;
      top: 0;
      z-index: 50;
      background: linear-gradient(180deg, #222833 0%, var(--nav) 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
      margin: 0 0 28px;
      padding: 0;
    }
    header.brand .nav-inner {
      width: min(var(--max), 100%);
      margin: 0 auto;
      padding: 20px var(--pad) 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
    }
    header.brand .logo {
      display: block;
      width: 100%;
      text-decoration: none;
      color: inherit;
      line-height: 0;
    }
    header.brand .logo img {
      width: 100%;
      height: auto;
      max-height: none;
      display: block;
      object-fit: contain;
      background: #fff;
      border-radius: 16px;
      padding: 12px 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.28);
    }
    header.brand h1.sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    header.brand p {
      margin: 0;
      color: var(--sub);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      line-height: 1.5;
      text-align: center;
      max-width: none;
    }

    .wrap {
      width: min(var(--max), 100%);
      margin: 0 auto;
      padding: 0 var(--pad) 96px;
    }

    /* —— 블로그 포스팅 카드 —— */
    .card {
      background: linear-gradient(165deg, var(--card-lift) 0%, var(--card) 48%, #131820 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0;
      margin: 0 0 28px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      box-shadow:
        0 16px 48px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(61, 214, 140, 0.12),
        0 0 24px rgba(61, 214, 140, 0.05);
    }
    .card .meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--sub);
      margin: 0;
      padding: 18px var(--pad) 0;
    }
    .tag {
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .card h2 {
      margin: 0;
      padding: 12px var(--pad) 16px;
      font-size: clamp(20px, 4.2vw, 24px);
      line-height: 1.45;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #f3f6fa;
    }

    /* 썸네일: 카드 좌우에 딱 맞춤 */
    .thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      margin: 0 0 22px;
      border-radius: 0;
      background: #0f141b;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    /* 본문 칼럼 */
    .body,
    .body-half {
      font-size: 18px;
      line-height: 2;
      color: #d8dee6;
      word-break: keep-all;
      overflow-wrap: break-word;
      padding: 0 var(--pad);
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }
    .body:last-child,
    .body-half:last-of-type {
      padding-bottom: 28px;
    }

    .ad-slot {
      margin: 16px var(--pad);
      padding: 14px;
      border: 1px dashed rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.22);
      min-height: 90px;
      text-align: center;
    }
    .ad-slot .ad-label {
      font-size: 11px;
      color: #6b7582;
      margin-bottom: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .state {
      text-align: center;
      color: var(--sub);
      padding: 64px 16px;
      font-size: 15px;
      line-height: 1.7;
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    footer.note {
      margin-top: 8px;
      padding: 24px 8px 8px;
      font-size: 12px;
      color: var(--sub);
      text-align: center;
      line-height: 1.7;
      border-top: 1px solid var(--line);
    }

    @media (min-width: 768px) {
      header.brand .nav-inner {
        padding: 24px 28px 22px;
      }
      header.brand .logo img {
        padding: 14px 20px;
        border-radius: 18px;
      }
      header.brand p {
        font-size: 14px;
      }
      .wrap { padding: 8px 28px 120px; }
      .card { margin-bottom: 36px; }
      .card .meta,
      .card h2,
      .body,
      .body-half { padding-left: 28px; padding-right: 28px; }
      .ad-slot { margin-left: 28px; margin-right: 28px; }
      .thumb { margin-bottom: 28px; }
    }
  </style>
</head>
<body>
  <header class="brand">
    <div class="nav-inner">
      <a class="logo" href="./news.html">
        <img src="./moneykey-logo.png" alt="머니키 리포트" width="1024" height="277" />
      </a>
      <p>프리미엄 금융 · 거시경제 칼럼</p>
    </div>
    <h1 class="sr-only">머니키 리포트</h1>
  </header>
  <div class="wrap">
    <div id="feed" class="state">불러오는 중…</div>
    <footer class="note">본 페이지는 정보 제공 목적이며 투자 권유가 아닙니다.</footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      var cfg = window.MONEYKEY_CONFIG || {};
      var feed = document.getElementById("feed");

      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function adBox(label) {
        return (
          '<aside class="ad-slot" aria-label="Advertisement">' +
          '<div class="ad-label">' + esc(label || "Advertisement") + "</div>" +
          "<!-- Google AdSense (승인 후 주석 해제)\n" +
          '<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=' +
          esc(cfg.ADSENSE_CLIENT || "") +
          '" crossorigin="anonymous"><\\/script>\n' +
          '<ins class="adsbygoogle" style="display:block" data-ad-client="' +
          esc(cfg.ADSENSE_CLIENT || "") +
          '" data-ad-slot="' +
          esc(cfg.ADSENSE_SLOT || "") +
          '" data-ad-format="fluid"><\\/ins>\n' +
          "<script>(adsbygoogle = window.adsbygoogle || []).push({});<\\/script>\n" +
          "-->" +
          '<div style="color:#6b7582;font-size:12px;padding:14px 0">AdSense slot</div>' +
          "</aside>"
        );
      }

      function bodyWithMidAd(raw) {
        // DB: 이스케이프 + <br> 저장본
        var html = String(raw || "");
        if (html.indexOf("<br") < 0) {
          html = esc(html).replace(/\n/g, "<br>");
        }
        var parts = html.split(/<br\s*\/?>/i);
        if (parts.length < 4) {
          return '<div class="body">' + html + "</div>";
        }
        var mid = Math.floor(parts.length / 2);
        var top = parts.slice(0, mid).join("<br>");
        var bottom = parts.slice(mid).join("<br>");
        // 맺음말(오늘 준비한…) 직전에도 광고 — 하단부를 다시 쪼갬
        var closeIdx = -1;
        for (var i = 0; i < parts.length; i++) {
          if (parts[i].indexOf("오늘 준비한 시황") >= 0
              || parts[i].indexOf("오늘 준비한 소식") >= 0
              || parts[i].indexOf("오늘 준비한 경제") >= 0) {
            closeIdx = i;
            break;
          }
        }
        if (closeIdx > mid) {
          var midPart = parts.slice(mid, closeIdx).join("<br>");
          var closePart = parts.slice(closeIdx).join("<br>");
          return (
            '<div class="body body-half">' + top + "</div>" +
            adBox("본문 중간") +
            '<div class="body body-half">' + midPart + "</div>" +
            adBox("맺음말 직전") +
            '<div class="body body-half">' + closePart + "</div>"
          );
        }
        return (
          '<div class="body body-half">' + top + "</div>" +
          adBox("본문 중간") +
          '<div class="body body-half">' + bottom + "</div>" +
          adBox("맺음말 직전")
        );
      }

      function fmtDate(iso) {
        try {
          var d = new Date(iso);
          if (isNaN(d.getTime())) return "";
          return d.toLocaleString("ko-KR", {
            year: "numeric", month: "2-digit", day: "2-digit",
            hour: "2-digit", minute: "2-digit"
          });
        } catch (e) { return ""; }
      }

      function cardHtml(row) {
        var title = row.title || "";
        var img = row.image_url || "";
        return (
          '<article class="card">' +
          '<div class="meta"><span class="tag">' +
          esc(row.category || "주식") +
          "</span><span>" + esc(fmtDate(row.created_at)) + "</span></div>" +
          (img
            ? '<img class="thumb" src="' + esc(img) + '" alt="' + esc(title) + '" loading="lazy" />'
            : "") +
          adBox("썸네일 바로 아래") +
          "<h2>" + esc(title) + "</h2>" +
          bodyWithMidAd(row.body || "") +
          "</article>"
        );
      }

      async function load() {
        if (!cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY) {
          feed.innerHTML = '<div class="state">CONFIG 키를 입력하세요.</div>';
          return;
        }
        try {
          var client = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
          var res = await client
            .from(cfg.TABLE || "posts")
            .select("id,title,body,image_url,category,created_at")
            .order("created_at", { ascending: false })
            .limit(40);
          if (res.error) throw res.error;
          var rows = res.data || [];
          if (!rows.length) {
            feed.innerHTML = '<div class="state">아직 발행된 리포트가 없습니다.</div>';
            return;
          }
          feed.innerHTML = rows.map(cardHtml).join("");
        } catch (err) {
          feed.innerHTML =
            '<div class="state">불러오기 실패: ' +
            esc((err && err.message) || String(err)) +
            "</div>";
        }
      }

      load();
    })();
  </script>
</body>
</html>
