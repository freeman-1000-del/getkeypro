    .tag::after {

    @keyframes tag-glow {

    @keyframes tag-shine {

    </div>
    <h1 class="sr-only">머니키 리포트</h1>
  </header>
  <div class="wrap">
    <div id="feed" class="state">불러오는 중…</div>
    <footer class="note">본 페이지는 정보 제공 목적이며 투자 권유가 아닙니다.</footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      var cfg = window.MONEYKEY_CONFIG || {};
      var feed = document.getElementById("feed");

      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function adBox(label) {
        // AdSense 승인 전: 플레이스홀더 노출 없음
        return "";
      }

      function isFillerCue(text) {
        var t = String(text || "").trim();
        return (
          t === "첫 번째 소식 보시죠." ||
          t === "첫 번째 소식입니다." ||
          t === "다음 소식 보시죠." ||
          t === "그 다음 소식 보실까요?" ||
          t === "두 번째 소식 보시죠." ||
          /^다음은\s*['‘'].+['’']\s*이야기입니다\.?$/.test(t)
        );
      }

      function isHookEcho(line, hook) {
        if (!line || !hook) return false;
        // 알려진 동어 반복
        if (
          line === "요즘 주식 시장이 뒤숭숭하죠?" ||
          line === "코스피가 하룻새 6.3%나 급락하면서 7000선을 밑돌았습니다."
        ) {
          return true;
        }
        var nums = hook.match(/\d+(?:\.\d+)?%?/g) || [];
        if (!nums.length) return false;
        var numHit = 0;
        for (var n = 0; n < nums.length; n++) {
          if (line.indexOf(nums[n]) >= 0) numHit++;
        }
        if (!numHit) return false;
        var keys = ["코스피", "급락", "하룻새", "레버리지", "연금", "고령", "대출", "7000"];
        var shared = 0;
        for (var k = 0; k < keys.length; k++) {
          if (hook.indexOf(keys[k]) >= 0 && line.indexOf(keys[k]) >= 0) shared++;
        }
        return shared >= 2;
      }

      function isClosingCue(line) {
        return (
          line === "오늘 준비한 시황 소식은 여기까지입니다." ||
          line === "오늘 준비한 경제 흐름 소식은 여기까지입니다." ||
          line.indexOf("오늘 준비한 시황 소식은 여기까지") === 0 ||
          line.indexOf("오늘 준비한 경제 흐름 소식은 여기까지") === 0
        );
      }

      function decorateBody(raw, cardTitle) {
        var html = String(raw || "");
        var titleNorm = String(cardTitle || "")
          .replace(/[.\s]+$/g, "")
          .trim();
        if (html.indexOf("<br") < 0) {
          html = esc(html).replace(/\n/g, "<br>");
        }
        var parts = html.split(/<br\s*\/?>/i);
        var out = [];
        var afterFiller = false;
        var lastHook = "";
        var inClosing = false;
        var shownFactLabel = false;
        var shownOpinionLabel = false;
        var shownNyLabel = false;
        var shownReviewLabel = false;
        var chartQueue = [];
        for (var i = 0; i < parts.length; i++) {
          var line = String(parts[i] || "")
            .replace(/&nbsp;/gi, " ")
            .trim();
          if (!line) continue;

          function paintColored(text, colorClass) {
            if (colorClass === "seg-hook") {
              out.push('<p class="seg-hook">' + text + "</p>");
            } else if (colorClass === "seg-proverb") {
              out.push('<p class="seg-proverb">' + text + "</p>");
            } else if (colorClass === "seg-red") {
              out.push('<p class="seg-red">' + text + "</p>");
            } else if (colorClass === "seg-orange") {
              out.push('<p class="seg-orange">' + text + "</p>");
            } else {
              out.push('<p class="seg">' + text + "</p>");
            }
          }

          function takeColorPrefix(s) {
            if (s.indexOf("«H»") === 0 || s.indexOf("&laquo;H&raquo;") === 0) {
              return { cls: "seg-hook", text: s.replace(/^«H»/, "").replace(/^&laquo;H&raquo;/, "") };
            }
            if (s.indexOf("«P»") === 0 || s.indexOf("&laquo;P&raquo;") === 0) {
              return { cls: "seg-proverb", text: s.replace(/^«P»/, "").replace(/^&laquo;P&raquo;/, "") };
            }
            if (s.indexOf("«R»") === 0 || s.indexOf("&laquo;R&raquo;") === 0) {
              return { cls: "seg-red", text: s.replace(/^«R»/, "").replace(/^&laquo;R&raquo;/, "") };
            }
            if (s.indexOf("«O»") === 0 || s.indexOf("&laquo;O&raquo;") === 0) {
              return { cls: "seg-orange", text: s.replace(/^«O»/, "").replace(/^&laquo;O&raquo;/, "") };
            }
            return null;
          }

          if (line.indexOf("【전일 시황") === 0 || line.indexOf("【금일 시황") === 0
              || line.indexOf("【당일 시황") === 0
              || line.indexOf("【근일 시황") === 0 || line.indexOf("【직전 시황") === 0
              || line.indexOf("【한국 증시") === 0 || line.indexOf("【핵심") === 0) {
            if (!shownFactLabel) {
              var fl = "시황";
              if (line.indexOf("【당일") === 0 || line.indexOf("【금일") === 0) fl = "당일 시황";
              else if (line.indexOf("【전일") === 0) fl = "전일 시황";
              else if (line.indexOf("【근일") === 0) fl = "시황";
              else if (line.indexOf("【직전") === 0) fl = "전일 시황";
              out.push('<p class="seg-label">' + fl + '</p>');
              shownFactLabel = true;
            }
            continue;
          }
          if (line.indexOf("【뉴욕증시") === 0 || line.indexOf("【전일 뉴욕") === 0) {
            if (!shownNyLabel) {
              out.push('<p class="seg-label ny">뉴욕증시 분석</p>');
              shownNyLabel = true;
            }
            continue;
          }
          if (line.indexOf("【기타") === 0) {
            out.push('<p class="seg-label">기타 사항</p>');
            continue;
          }
          if (line.indexOf("【증시 총평】") === 0) {
            if (!shownReviewLabel) {
              out.push('<p class="seg-label review">증시 총평</p>');
              shownReviewLabel = true;
            }
            continue;
          }
          if (line.indexOf("【관리자 의견】") === 0 || line.indexOf("【내 생각】") === 0
              || line.indexOf("【코멘트】") === 0) {
            // 독자에게 라벨 노출하지 않음
            continue;
          }

          // 표
          if (line.indexOf("«TABLE»") === 0) {
            try {
              var td = JSON.parse(line.replace(/^«TABLE»/, ""));
              var ths = (td.headers || []).map(function (h) {
                return "<th>" + esc(String(h)) + "</th>";
              }).join("");
              var trs = (td.rows || []).map(function (row) {
                return "<tr>" + (row || []).map(function (c) {
                  return "<td>" + esc(String(c)) + "</td>";
                }).join("") + "</tr>";
              }).join("");
              out.push(
                '<div class="mk-table-wrap">' +
                (td.title ? '<p class="seg-label">' + esc(String(td.title)) + "</p>" : "") +
                "<table><thead><tr>" + ths + "</tr></thead><tbody>" + trs +
                "</tbody></table></div>"
              );
            } catch (e) {
              out.push('<p class="seg">표 데이터를 표시할 수 없습니다.</p>');
            }
            afterFiller = false;
            continue;
          }
          // 차트 (Chart.js)
          if (line.indexOf("«CHART»") === 0) {
            try {
              var cd = JSON.parse(line.replace(/^«CHART»/, ""));
              var cid = "mkc-" + Math.random().toString(36).slice(2, 9);
              chartQueue.push({ id: cid, data: cd });
              out.push(
                '<div class="mk-chart-wrap">' +
                (cd.title ? '<p class="seg-label">' + esc(String(cd.title)) + "</p>" : "") +
                '<canvas id="' + cid + '" height="220"></canvas></div>'
              );
            } catch (e) {
              out.push('<p class="seg">차트 데이터를 표시할 수 없습니다.</p>');
            }
            afterFiller = false;
            continue;
          }
          // 뉴욕 브리핑
          if (line.indexOf("«NY»") === 0) {
            var nyt = line.replace(/^«NY»/, "");
            if (!shownNyLabel) {
              out.push('<p class="seg-label ny">전일 뉴욕증시 브리핑</p>');
              shownNyLabel = true;
            }
            out.push('<p class="seg-ny">' + nyt + "</p>");
            afterFiller = false;
            continue;
          }
          // 증시 총평
          if (line.indexOf("«REVIEW»") === 0) {
            var rv = line.replace(/^«REVIEW»/, "");
            if (!shownReviewLabel) {
              out.push('<p class="seg-label review">증시 총평</p>');
              shownReviewLabel = true;
            }
            out.push('<p class="seg-review">' + rv + "</p>");
            afterFiller = false;
            continue;
          }

          // «F» 사실 (±강조색)
          if (line.indexOf("«F»") === 0 || line.indexOf("&laquo;F&raquo;") === 0) {
            var ft = line.replace(/^«F»/, "").replace(/^&laquo;F&raquo;/, "");
            if (!shownFactLabel) {
              out.push('<p class="seg-label">시황</p>');
              shownFactLabel = true;
              shownOpinionLabel = false;
            }
            var fc = takeColorPrefix(ft);
            if (fc) paintColored(fc.text, fc.cls);
            else out.push('<p class="seg-fact">' + ft + "</p>");
            afterFiller = false;
            continue;
          }
          // «M» 코멘트 — 라벨 없이 문단만 (독자에게 '관리자' 노출 금지)
          if (line.indexOf("«M»") === 0 || line.indexOf("&laquo;M&raquo;") === 0) {
            var mt = line.replace(/^«M»/, "").replace(/^&laquo;M&raquo;/, "");
            var isEmptyOp = !mt || /관리자 의견을 적어|내 생각을 적어|여기에 코멘트/.test(mt)
              || mt.indexOf("（여기") === 0;
            if (isEmptyOp) continue;
            var mc = takeColorPrefix(mt);
            if (mc) paintColored(mc.text, mc.cls);
            else out.push('<p class="seg-opinion">' + mt + "</p>");
            afterFiller = false;
            shownOpinionLabel = true;
            shownFactLabel = false;
            continue;
          }
          // 발행 마커 «H»후킹 — 카드 제목과 같으면 생략
          if (line.indexOf("«H»") === 0 || line.indexOf("&laquo;H&raquo;") === 0) {
            var hook = line.replace(/^«H»/, "").replace(/^&laquo;H&raquo;/, "");
            var hookNorm = String(hook || "").replace(/[.\s]+$/g, "").trim();
            if (titleNorm && hookNorm && (hookNorm === titleNorm || titleNorm.indexOf(hookNorm) === 0)) {
              continue;
            }
            lastHook = hook;
            out.push('<p class="seg-hook">' + hook + "</p>");
            afterFiller = false;
            inClosing = false;
            shownFactLabel = false;
            shownOpinionLabel = false;
            shownNyLabel = false;
            shownReviewLabel = false;
            continue;
          }
          // 증시 격언 «P»
          if (line.indexOf("«P»") === 0 || line.indexOf("&laquo;P&raquo;") === 0) {
            var proverb = line.replace(/^«P»/, "").replace(/^&laquo;P&raquo;/, "");
            out.push('<p class="seg-proverb">' + proverb + "</p>");
            afterFiller = false;
            continue;
          }
          // «R» 빨강 · «O» 주황
          if (line.indexOf("«R»") === 0 || line.indexOf("&laquo;R&raquo;") === 0) {
            var red = line.replace(/^«R»/, "").replace(/^&laquo;R&raquo;/, "");
            out.push('<p class="seg-red">' + red + "</p>");
            afterFiller = false;
            continue;
          }
          if (line.indexOf("«O»") === 0 || line.indexOf("&laquo;O&raquo;") === 0) {
            var ora = line.replace(/^«O»/, "").replace(/^&laquo;O&raquo;/, "");
            out.push('<p class="seg-orange">' + ora + "</p>");
            afterFiller = false;
            continue;
          }
          if (
            line === "오늘의 증시 격언입니다." ||
            line === "소문에 사고 뉴스에 팔아라." ||
            line.indexOf("소문에 사고 뉴스에 팔아라") === 0
          ) {
            out.push('<p class="seg-proverb">' + line + "</p>");
            afterFiller = false;
            continue;
          }
          // 구형 장황 오프닝 숨김
          if (
            line.indexOf("[MoneyKey Report] 오늘의 핵심") === 0 ||
            line === "오늘의 핵심 금융 자산 리포트입니다." ||
            line === "오늘의 핵심 글로벌 거시경제 리포트입니다."
          ) {
            continue;
          }
          if (isFillerCue(line)) {
            afterFiller = true; // 사족 삭제, 다음 줄을 후킹으로
            continue;
          }
          // 직전 후킹과 같은 사실 되풀이 제거
          if (isHookEcho(line, lastHook)) {
            continue;
          }
          if (afterFiller) {
            out.push('<p class="seg-hook">' + line + "</p>");
            afterFiller = false;
            lastHook = line;
            continue;
          }
          if (isClosingCue(line) && !inClosing) {
            inClosing = true;
            out.push('<p class="seg seg-closing">' + line + "</p>");
            continue;
          }
          out.push('<p class="seg">' + line + "</p>");
        }
        setTimeout(function () {
          (chartQueue || []).forEach(function (item) {
            var el = document.getElementById(item.id);
            if (!el || !window.Chart) return;
            var d = item.data || {};
            new Chart(el, {
              type: d.type === "line" ? "line" : "bar",
              data: {
                labels: d.labels || [],
                datasets: [
                  {
                    label: d.unit ? "수치(" + d.unit + ")" : "수치",
                    data: d.values || [],
                    backgroundColor: "rgba(61, 214, 140, 0.55)",
                    borderColor: "#3dd68c",
                    borderWidth: 2,
                    tension: 0.25,
                  },
                ],
              },
              options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                  x: {
                    ticks: { color: "#8b949e" },
                    grid: { color: "rgba(255,255,255,0.06)" },
                  },
                  y: {
                    ticks: { color: "#8b949e" },
                    grid: { color: "rgba(255,255,255,0.06)" },
                  },
                },
              },
            });
          });
        }, 40);
        return '<div class="body">' + out.join("") + "</div>";
      }

      function bodyWithMidAd(raw, cardTitle) {
        return decorateBody(raw, cardTitle);
      }

      function sessionDateFromBody(body) {
        var s = String(body || "");
        var m = s.match(/【당일 시황[^\d]*(\d{4}-\d{2}-\d{2})/);
        if (m) return m[1];
        m = s.match(/【전일 시황[^\d]*(\d{4}-\d{2}-\d{2})/);
        if (m) return m[1];
        m = s.match(/【금일 시황[^\d]*(\d{4}-\d{2}-\d{2})/);
        if (m) return m[1];
        m = s.match(/직전 거래일\s*(\d{4}-\d{2}-\d{2})/);
        if (m) return m[1];
        m = s.match(/【근일 시황[^\d]*(\d{4}-\d{2}-\d{2})/);
        if (m) return m[1];
        m = s.match(/【직전 시황[^\d]*(\d{4}-\d{2}-\d{2})/);
        return m ? m[1] : "";
      }

      function fmtSessionLabel(ymd, editionHint) {
        if (!ymd) return "";
        var p = ymd.split("-");
        if (p.length !== 3) return ymd;
        var label = editionHint === "preopen" ? "장전" : "장마감";
        return p[0] + ". " + p[1] + ". " + p[2] + ". " + label;
      }

      function fmtDate(iso) {
        try {
          var d = new Date(iso);
          if (isNaN(d.getTime())) return "";
          return d.toLocaleString("ko-KR", {
            year: "numeric", month: "2-digit", day: "2-digit",
            hour: "2-digit", minute: "2-digit"
          });
        } catch (e) { return ""; }
      }

      function cardHtml(row) {
        var title = row.title || "";
        var img = row.image_url || "";
        var body = row.body || "";
        var sess = sessionDateFromBody(body);
        var dateLabel = sess
          ? fmtSessionLabel(sess, body.indexOf("【뉴욕증시") >= 0 ? "preopen" : "close")
          : fmtDate(row.created_at);
        return (
          '<article class="card">' +
          '<div class="meta"><span class="session-date">' +
          esc(dateLabel) +
          "</span></div>" +
          (img
            ? '<img class="thumb" src="' + esc(img) + '" alt="' + esc(title) + '" loading="lazy" />'
            : "") +
          adBox("썸네일 바로 아래") +
          "<h2>" + esc(title) + "</h2>" +
          bodyWithMidAd(body, title) +
          "</article>"
        );
      }

      async function load() {
        if (!cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY) {
          feed.innerHTML = '<div class="state">CONFIG 키를 입력하세요.</div>';
          return;
        }
        var client = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
        var table = cfg.TABLE || "posts";
        var attempt = 0;
        var lastErr = null;
        while (attempt < 3) {
          attempt += 1;
          try {
            // 1) 본문만 먼저 (대용량 data-URI 썸네일 제외 → 타임아웃 방지)
            var res = await client
              .from(table)
              .select("id,title,body,category,created_at")
              .eq("category", "주식")
              .order("created_at", { ascending: false })
              .limit(6);
            if (res.error) throw res.error;
            var rows = res.data || [];
            var picked = [];
            for (var i = 0; i < rows.length; i++) {
              var row = rows[i];
              var t = String(row.title || "");
              var b = String(row.body || "");
              if (t.indexOf("__probe__") >= 0) continue;
              if (t.indexOf("외 1건") >= 0) continue; // 옛 기사형 폐기
              if (t.indexOf("[삭제예정]") >= 0) continue;
              // 가상 '금일'만 있고 당일/전일 구조가 없으면 스킵(옛 샘플)
              if (b.indexOf("【금일 시황") >= 0 && b.indexOf("【당일 시황") < 0
                  && b.indexOf("【전일 시황") < 0 && b.indexOf("【근일 시황") < 0
                  && b.indexOf("【직전 시황") < 0) {
                continue;
              }
              if (b.indexOf("【금일 시황") < 0 && b.indexOf("【당일 시황") < 0
                  && b.indexOf("【전일 시황") < 0
                  && b.indexOf("【근일 시황") < 0 && b.indexOf("【직전 시황") < 0
                  && b.indexOf("«F»") < 0 && b.indexOf("«REVIEW»") < 0) {
                continue; // 시황 본문 없는 글 스킵
              }
              picked.push(row);
              break; // 최신 시황 1건
            }
            if (!picked.length) {
              feed.innerHTML = '<div class="state">아직 발행된 리포트가 없습니다.</div>';
              return;
            }
            // 이미지 없이 먼저 렌더
            feed.innerHTML = picked.map(function (r) {
              return cardHtml(Object.assign({}, r, { image_url: "" }));
            }).join("");

            // 2) 썸네일만 별도 조회 (data-URI·초대형 이미지는 스킵)
            var ids = picked.map(function (r) { return r.id; });
            var imgRes = await client
              .from(table)
              .select("id,image_url")
              .in("id", ids);
            if (!imgRes.error && imgRes.data) {
              var byId = {};
              imgRes.data.forEach(function (r) {
                var u = r.image_url || "";
                // base64 data-URI는 용량·표시 모두 문제 → 무시
                if (u.indexOf("data:") === 0) u = "";
                byId[r.id] = u;
              });
              picked.forEach(function (r) { r.image_url = byId[r.id] || ""; });
              feed.innerHTML = picked.map(cardHtml).join("");
            }
            return;
          } catch (err) {
            lastErr = err;
            // 타임아웃이면 짧게 재시도
            var msg = (err && err.message) || String(err);
            if (msg.indexOf("timeout") < 0 || attempt >= 3) break;
            await new Promise(function (r) { setTimeout(r, 700 * attempt); });
          }
        }
        feed.innerHTML =
          '<div class="state">불러오기 실패: ' +
          esc((lastErr && lastErr.message) || String(lastErr)) +
          "<br><button type='button' id='mk-retry' style='margin-top:12px;padding:8px 14px;border-radius:10px;border:0;background:#3dd68c;color:#0d1117;font-weight:700;cursor:pointer'>다시 시도</button></div>";
        var btn = document.getElementById("mk-retry");
        if (btn) btn.onclick = function () { feed.innerHTML = '<div class="state">불러오는 중…</div>'; load(); };
      }

      load();
    })();
  </script>
</body>
</html>
